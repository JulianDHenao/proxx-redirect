<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxx</title>

<script>
  const searchParams = new URLSearchParams(window.location.search);
  const errorCode = searchParams.get('error_code');
  const error = searchParams.get('error');
  const code = searchParams.get('code');

  if (errorCode === 'otp_expired' || error === 'access_denied') {
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.display = 'flex';
      document.getElementById('card-pago').style.display = 'none';
      document.getElementById('card-error').style.display = 'block';
    });
  } else if (code) {
    // PKCE flow — pasar el code a la app via deep link
    window.location.replace(
      'com.studioprix.proxx://reset-password?code=' + code
    );
  } else {
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.display = 'flex';
    });
  }
</script>
  
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{display:none;font-family:sans-serif;background:#F4F7FF;align-items:center;justify-content:center;height:100vh;padding:24px}
    .card{background:#fff;border-radius:24px;padding:40px 32px;text-align:center;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(13,43,91,.12)}
    .icon{width:72px;height:72px;background:linear-gradient(135deg,#FF6A00,#FFB347);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
    h1{color:#0D2B5B;font-size:22px;font-weight:700;margin-bottom:10px}
    p{color:#5C7299;font-size:15px;line-height:1.5;margin-bottom:28px}
    .btn{display:block;background:linear-gradient(135deg,#0D2B5B,#1E6BFF);color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:600;cursor:pointer;width:100%;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚡</div>
    <h1>¡Pago exitoso!</h1>
    <p>Tus créditos serán acreditados en unos segundos. Vuelve a Proxx y actualiza tu saldo.</p>
    <a class="btn" href="com.studioprix.proxx://creditos">Volver a Proxx</a>
  </div>
</body>
</html>>
